<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{width:1920px;height:1080px;background:linear-gradient(160deg,#f4f6fb,#eaf0f8);display:flex;align-items:center;justify-content:center;gap:0;color:#0c1322}
.col{display:flex;flex-direction:column;gap:16px;width:380px}
.src{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e6e9ef;border-radius:16px;padding:18px 22px;box-shadow:0 12px 30px rgba(16,24,40,.07)}
.src .ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.src .n{font-weight:700;font-size:1.2rem}
.arrow{font-size:3rem;color:#b8c2d4;margin:0 44px}
.sig{width:300px;height:300px;border-radius:40px;background:#1f2734;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;box-shadow:0 40px 90px rgba(31,39,52,.35)}
.sig .lg{width:64px;height:64px;border-radius:50%;border:2px solid #fff;position:relative}
.sig .lg::after{content:"";position:absolute;inset:20px;border-radius:50%;background:#fff}
.sig .t{font-weight:800;font-size:1.9rem;font-style:italic}
.sig .s{color:#9aa6b8;font-size:.95rem;letter-spacing:.12em;text-transform:uppercase}
.wa{width:360px;background:#0b3d2e;border-radius:28px;padding:26px;box-shadow:0 40px 90px rgba(11,61,46,.30)}
.wa .h{display:flex;align-items:center;gap:10px;color:#fff;font-weight:700;font-size:1.3rem;margin-bottom:18px}
.wa .dot{width:12px;height:12px;border-radius:50%;background:#25D366}
.bub{background:#10241c;border-radius:6px 16px 16px 16px;padding:18px 20px}
.bub .u{color:#f0857d;font-weight:800;font-size:1.05rem;margin-bottom:8px}
.bub .x{color:#e9edef;font-size:1.05rem;line-height:1.5;margin-bottom:10px}
.bub .i{color:#9fd9bf;font-size:.95rem;margin-bottom:12px}
.bub .r{color:#8fb9a8;font-size:.9rem;border-top:1px solid rgba(255,255,255,.1);padding-top:11px}
.bub .r b{color:#7fe0c0}
</style></head><body>
<div class="col">
 <div class="src"><div class="ic" style="background:#e8f0fe">⭐</div><div class="n">Google Reviews</div></div>
 <div class="src"><div class="ic" style="background:#efeafe">🛵</div><div class="n">Getir</div></div>
 <div class="src"><div class="ic" style="background:#ffe8ee">🍽️</div><div class="n">Yemeksepeti</div></div>
 <div class="src"><div class="ic" style="background:#fff0e0">🛍️</div><div class="n">Trendyol</div></div>
 <div class="src"><div class="ic" style="background:#e6f6ef">🧾</div><div class="n">POS</div></div>
 <div class="src"><div class="ic" style="background:#fdeede">📊</div><div class="n">Google Analytics</div></div>
</div>
<div class="arrow">→</div>
<div class="sig"><div class="lg"></div><div class="t">Signal</div><div class="s">AI engine</div></div>
<div class="arrow">→</div>
<div class="wa">
 <div class="h"><span class="dot"></span> WhatsApp</div>
 <div class="bub"><div class="u">🔴 Urgent</div><div class="x">Wait times spiking at Kadıköy, 2× last week.</div><div class="i">💰 Weekend revenue at risk</div><div class="r">Reply <b>1</b> details · <b>2</b> on it · <b>3</b> skip</div></div>
</div>
</body></html>
